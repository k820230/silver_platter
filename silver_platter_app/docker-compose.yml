version: "3.7"

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    env_file: .env.example
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env.example
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    command: ["python", "-m", "silver_platter.worker.main"]
    env_file: .env.example
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    command: ["python", "-m", "silver_platter.worker.scheduler"]
    env_file: .env.example
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    volumes:
      - /home/jhkim5/backup_sp:/home/jhkim5/backup_sp

  redis:
    image: redis:7
    ports:
      - "6379:6379"
